<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16202c"/>
      <stop offset="1" stop-color="#0f1113"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#42a5f5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#42a5f5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bbdefb"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#1976d2" stroke-opacity="0.35" stroke-width="2"/>

  <!-- radar rings -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#1976d2" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="#1976d2" stroke-opacity="0.35" stroke-width="1.25"/>
  <circle cx="32" cy="32" r="8" fill="none" stroke="#1976d2" stroke-opacity="0.25" stroke-width="1"/>

  <!-- crosshairs -->
  <path d="M32 8v6M32 50v6M8 32h6M50 32h6" stroke="#1976d2" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round"/>

  <!-- radar sweep wedge -->
  <path d="M32 32 L52 12 A28.28 28.28 0 0 1 60 32 Z" fill="url(#sweep)"/>

  <!-- contact blips -->
  <circle cx="45" cy="22" r="2.4" fill="#42a5f5"/>
  <circle cx="21" cy="42" r="1.8" fill="#42a5f5" fill-opacity="0.6"/>

  <!-- aircraft -->
  <g transform="translate(32 33) rotate(45) translate(-12 -12)">
    <path fill="url(#plane)" d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
  </g>
</svg>
